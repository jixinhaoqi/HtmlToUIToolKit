                wi.addEventListener('input',ups);hi.addEventListener('input',ups);updatePreview(htmlInput.value,cw,ch);
                let timer;htmlInput.addEventListener('input',e=>{clearTimeout(timer);timer=setTimeout(()=>updatePreview(e.target.value,cw,ch),400);});
                document.getElementById('convertBtn').addEventListener('click',performConversion);
                document.getElementById('downloadBtn').addEventListener('click',()=>{const data=window._downloadUxml;if(!data){showMessage('请先执行转换','error');return;}const blob=new Blob([data],{type:'application/octet-stream'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='output.uxml';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(a.href);showMessage('⬇️ 已下载 output.uxml','success');});
                document.getElementById('downloadUssBtn').addEventListener('click',()=>{const data=window._downloadUss;if(!data){showMessage('请先执行转换','error');return;}const blob=new Blob([data],{type:'application/octet-stream'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='output.uss';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(a.href);showMessage('⬇️ 已下载 output.uss','success');});
                setTimeout(performConversion,300);window.addEventListener('resize',()=>updateIframeScale(cw,ch));
            });
            window.copyToClipboard=function(elementId){const text=document.getElementById(elementId).textContent;navigator.clipboard.writeText(text).then(()=>showMessage('📋 已复制到剪贴板','success')).catch(()=>showMessage('复制失败，请手动选择','error'));};
        })();
    </script>
</body>
</html>
